# .github/workflows/ci.yml

name: Deploy Project Page

on:
  push:
    branches: [ "web-source" ]
  workflow_dispatch:

# ❗️❗️❗️ 关键部分在这里 ❗️❗️❗️
# 确保这一整块都存在、没有拼写错误、并且缩进正确
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # ... 下面的步骤应该和之前一样 ...
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          ref: 'web-source'

      - name: Set up Node.js 🟩
        # ... etc